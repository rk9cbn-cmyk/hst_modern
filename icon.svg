<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Premium Dark Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg_grad)"/>
  
  <!-- "HST" Typography with Shadow -->
  <text x="50%" y="42%" dominant-baseline="middle" text-anchor="middle" 
        style="font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 900; font-size: 160px; letter-spacing: -5px;" 
        fill="white" filter="url(#shadow)">HST</text>
  
  <!-- Morse Code Decor (. . - .) -->
  <g transform="translate(256, 340)">
    <circle cx="-90" cy="0" r="16" fill="white" fill-opacity="0.9"/>
    <circle cx="-35" cy="0" r="16" fill="white" fill-opacity="0.9"/>
    <rect x="20" y="-14" width="70" height="28" rx="14" fill="white" fill-opacity="0.9"/>
    <circle cx="120" cy="0" r="16" fill="white" fill-opacity="0.9"/>
  </g>
</svg>
